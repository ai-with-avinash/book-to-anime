# StudyPanels — example configuration.
#
# Copy this file to `config.yaml` (in the working directory you run
# `booktoanime` from) and uncomment exactly one block under each of the
# `language`, `audio`, and `visual` sections to pick a provider.
#
# All `api_key_env` entries name an environment variable to read at startup;
# you can also pass `api_key:` directly (not recommended — it lands in the
# job manifest stored on disk).

# ---------------------------------------------------------------- top-level

# Job/state directory. May be overridden by --data-dir or BOOKTOANIME_DATA_DIR.
data_dir: ~/.local/share/booktoanime

# Pipeline profile:
#   default       — balanced, fits 8 GB GPU + CPU fallback
#   high_quality  — heavier checkpoints, lower concurrency
#   low_vram      — smallest viable models + concurrency=1
profile: default

defaults:
  # panel_style choices:
  #   clean-linework          — minimal-palette line art, technical-diagram look
  #   chalkboard-sketch       — white chalk on dark green, classroom aesthetic
  #   watercolor-technical    — muted earth palette, hand-painted scientific drawing
  #   flat-vector-infographic — bold geometric shapes, modern infographic style
  panel_style: clean-linework
  depth: undergraduate                    # eli5 | undergraduate | expert
  length_preset: standard                 # short | standard | in_depth
  aspect_ratio: "16:9"                    # 16:9 | 9:16 | 1:1
  narration:
    language: en-US
    voice_id: af_bella
    speed: 1.0

# ---------------------------------------------------------------- LANGUAGE

# Pick the provider you want via `language.active: <name>` and uncomment
# the matching sub-block. Every block under `language:` other than `active`
# is a *preset* — only the `active` one is read.
language:
  active: openai_compatible

  # ── Local (recommended — free, no API key) ────────────────────────────────
  openai_compatible:
    # Default points at Ollama. Switch base_url to any OpenAI-compatible
    # /v1/chat/completions endpoint (vLLM, LM Studio, llama.cpp server).
    base_url: http://localhost:11434/v1
    model: llama3.1:8b
    api_key_env: OPENAI_API_KEY            # ignored by Ollama; still required by some clients
    request_timeout_s: 60
    # base_url: https://api.openai.com/v1  # optional fallback to hosted OpenAI
    # base_url: http://localhost:8000/v1   # vLLM
    # base_url: http://localhost:1234/v1   # LM Studio
    # base_url: http://localhost:8080/v1   # llama.cpp server
    # vision: true                         # set when the local model is multimodal

  # ── Optional hosted fallbacks ────────────────────────────────────────────
  groq:
    model: llama-3.3-70b-versatile
    api_key_env: GROQ_API_KEY
    request_timeout_s: 60

  gemini:
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY

  anthropic:
    model: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY

  deepseek:
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY

  # Optional: a separate vision-capable provider used only when the active
  # provider lacks vision (raises CapabilityNotSupportedError). Name must
  # match one of the language blocks above.
  vision_fallback: gemini

# ---------------------------------------------------------------- AUDIO

audio:
  active: kokoro
  kokoro:
    voice_id: af_bella
    language: en-US
    sample_rate: 24000

# ---------------------------------------------------------------- VISUAL

visual:
  active: sdxl_diffusers
  sdxl_diffusers:
    checkpoint: stabilityai/stable-diffusion-xl-base-1.0
    ip_adapter_repo: h94/IP-Adapter
    ip_adapter_subfolder: sdxl_models
    ip_adapter_weights: ip-adapter-plus_sdxl_vit-h.safetensors
    width: 1920
    height: 1080
    steps: 28
    guidance: 5.5
    # device: cuda                  # cuda | mps | cpu | (omit = auto-detect)
    # persona_dir: ~/.local/share/booktoanime/personas

  # high_quality / opt-in (install separately):
  # animagine_xl: { ... }
  # illustrious:  { ... }
  # flux_dev:     { accepted_license: false }   # non-commercial

# ---------------------------------------------------------------- SERVER

server:
  host: 127.0.0.1
  port: 8765
  open_browser: true
